<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AlphaGo Admin - painel administrativo da plataforma AlphaGo Inside"
    />
    <title>AlphaGo Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800;900&family=League+Spartan:wght@800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      const STORAGE_KEY = 'alphago-admin.theme';
      const raw = localStorage.getItem(STORAGE_KEY);
      const theme = raw === 'light' || raw === 'dark' ? raw : 'dark';
      document.documentElement.classList.toggle('dark', theme === 'dark');
      document.documentElement.dataset.theme = theme;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
