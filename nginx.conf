server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # AlphaGate API (internal docker network)
  location /api/ {
    proxy_pass http://alphagate-web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Brain API (internal docker network)
  location = /brain-api {
    return 301 /brain-api/;
  }

  location /brain-api/ {
    proxy_pass http://brain-app:8003/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 600s;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
